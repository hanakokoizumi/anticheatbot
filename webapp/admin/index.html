<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>管理后台</title>
  <link rel="stylesheet" href="/shared/ui.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="toast" class="toast" style="display:none" aria-live="polite"></div>
  <div class="shell shell--wide">
    <p id="status" class="status-line" role="status" aria-live="polite" data-i18n="statusLoading">加载中…</p>
    <div id="panel" class="hidden">
      <header class="topbar">
        <h1><span data-i18n="pageTitle">群管理</span><span id="gab" class="badge badge--accent hidden" data-i18n="badgeGlobal">全局</span></h1>
        <p class="sub" data-i18n="subtitle">选择群组后修改设置、维护题库与查看统计。仅群管理员或全局管理员可访问。</p>
      </header>

      <div class="card" style="padding:0.75rem 1rem;margin-bottom:0.75rem">
        <div class="lang-bar" style="margin:0">
          <span class="sub" data-i18n="langLabel">界面语言</span>
          <select id="adminUiLocale" aria-label="locale">
            <option value="zh-Hans" data-i18n="langOptZh">简体中文</option>
            <option value="en" data-i18n="langOptEn">English</option>
            <option value="ja" data-i18n="langOptJa">日本語</option>
            <option value="ko" data-i18n="langOptKo">한국어</option>
          </select>
        </div>
      </div>

      <div class="card">
        <h2 class="section-title" data-i18n="sectionChat">当前群组</h2>
        <p style="margin:0;font-size:1rem;font-weight:600" id="cid">—</p>
        <div id="chats" class="chat-list" style="margin-top:0.75rem"></div>
      </div>

      <div class="toolbar">
        <button type="button" class="btn btn--secondary" id="reload" data-i18n="reload">重新加载</button>
        <button type="button" class="btn btn--secondary" id="cleartr" data-i18n="clearTranslation">清除翻译缓存</button>
      </div>

      <div class="card">
        <h2 class="section-title" data-i18n="sectionVerify">验证与开关</h2>
        <div class="field field--check">
          <input type="checkbox" id="f_verification_enabled" />
          <label for="f_verification_enabled" data-i18n="lblVerification">启用入群验证</label>
        </div>
        <div class="field">
          <label for="f_verify_mode" data-i18n="lblVerifyMode">验证模式</label>
          <select id="f_verify_mode">
            <option value="rules_ack" data-i18n="optRulesAck">群规确认</option>
            <option value="quiz" data-i18n="optQuiz">问卷</option>
          </select>
        </div>
        <div class="field">
          <label for="f_verify_timeout_seconds" data-i18n="lblVerifyTimeout">验证超时（秒）</label>
          <input type="number" id="f_verify_timeout_seconds" min="30" step="1" />
        </div>
        <div class="field field--check">
          <input type="checkbox" id="f_kick_on_verify_timeout" />
          <label for="f_kick_on_verify_timeout" data-i18n="lblKickTimeout">超时踢出</label>
        </div>
        <div class="field field--check">
          <input type="checkbox" id="f_turnstile_enabled" />
          <label for="f_turnstile_enabled" data-i18n="lblTurnstile">启用 Cloudflare Turnstile</label>
        </div>
      </div>

      <div id="admin_block_rules_mode">
        <div class="card">
          <h2 class="section-title" data-i18n="sectionRules">群规（Markdown）</h2>
          <div class="field">
            <label for="f_rules_markdown" data-i18n="lblRulesBody">正文</label>
            <textarea id="f_rules_markdown" class="textarea-lg" data-i18n-placeholder="phRules" placeholder="支持 Markdown 文本"></textarea>
          </div>
        </div>
      </div>

      <div id="admin_block_quiz_mode" class="hidden">
        <div class="card">
          <h2 class="section-title" data-i18n="sectionQuizCfg">问卷参数</h2>
          <div class="field">
            <label for="f_quiz_pass_score_threshold" data-i18n="lblQuizPass">及格分数线（总分制下）</label>
            <input type="number" id="f_quiz_pass_score_threshold" min="0" step="1" />
          </div>
          <div class="field">
            <label for="f_quiz_draw_count" data-i18n="lblQuizDraw">每次抽取题目数</label>
            <input type="number" id="f_quiz_draw_count" min="1" step="1" />
          </div>
        </div>

        <div class="card">
          <h2 class="section-title" id="quizBankHeading">题库</h2>
          <p id="quizBankHint" class="sub" style="margin:0 0 0.75rem" data-i18n="quizBankMultiHint"></p>
          <div id="quizList"></div>
          <h3 class="section-title" style="margin-top:1rem;font-size:0.875rem" data-i18n="subQuizForm">新增 / 编辑题目</h3>
          <input type="hidden" id="qf_id" value="" />
          <div class="field">
            <label for="qf_prompt" data-i18n="lblQuizPrompt">题干</label>
            <textarea id="qf_prompt" rows="3"></textarea>
          </div>
          <div class="field">
            <label for="qf_choices" data-i18n="lblQuizChoices">选项（每行一个，至少 2 行）</label>
            <textarea id="qf_choices" rows="5" data-i18n-placeholder="phQuizChoices" placeholder="选项 A&#10;选项 B&#10;…"></textarea>
          </div>
          <div class="field">
            <label for="qf_correct" data-i18n="lblQuizCorrect">正确答案序号（从 0 开始）</label>
            <input type="number" id="qf_correct" min="0" value="0" />
          </div>
          <div class="field">
            <label for="qf_points" data-i18n="lblQuizPoints">分值</label>
            <input type="number" id="qf_points" min="0" value="10" />
          </div>
          <div class="toolbar" style="margin-top:0">
            <button type="button" class="btn btn--primary" id="qf_save" data-i18n="btnQuizSave">保存题目</button>
            <button type="button" class="btn btn--secondary" id="qf_new" data-i18n="btnQuizNew">新建题目</button>
            <button type="button" class="btn btn--secondary" id="qf_reset" data-i18n="btnQuizReset">清空表单</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h2 class="section-title" data-i18n="sectionLang">语言与翻译</h2>
        <div class="field">
          <label for="f_canonical_locale" data-i18n="lblCanonical">规范语言（原文语言）</label>
          <input type="text" id="f_canonical_locale" placeholder="zh-Hans" />
        </div>
        <div class="field field--check">
          <input type="checkbox" id="f_llm_translation_enabled" />
          <label for="f_llm_translation_enabled" data-i18n="lblLlmTranslation">启用 LLM 翻译群规/题目</label>
        </div>
        <div class="field">
          <label for="f_translation_allowed_locales" data-i18n="lblAllowedLocales">允许翻译到的语言</label>
          <textarea id="f_translation_allowed_locales" rows="3" data-i18n-placeholder="phAllowedLocales" placeholder='留空表示不限制；或 JSON 数组如 ["en","ja"]'></textarea>
        </div>
      </div>

      <div class="card">
        <h2 class="section-title" data-i18n="sectionLlm">LLM 反垃圾</h2>
        <div class="field field--check">
          <input type="checkbox" id="f_llm_enabled" />
          <label for="f_llm_enabled" data-i18n="lblLlmEnabled">启用 LLM 审查新成员消息</label>
        </div>
        <div class="field">
          <label for="f_llm_max_messages" data-i18n="lblLlmMax">每名新成员最多审查条数</label>
          <input type="number" id="f_llm_max_messages" min="0" step="1" />
        </div>
        <div class="field">
          <label for="f_llm_min_confidence_action" data-i18n="lblLlmConf">采取行动最低置信度（0–1）</label>
          <input type="number" id="f_llm_min_confidence_action" min="0" max="1" step="0.05" />
        </div>
        <div class="field">
          <label for="f_spam_action" data-i18n="lblSpamAction">判定为垃圾时</label>
          <select id="f_spam_action">
            <option value="delete" data-i18n="optSpamDelete">仅删除</option>
            <option value="delete_and_restrict" data-i18n="optSpamRestrict">删除并限制</option>
          </select>
        </div>
      </div>

      <div class="card">
        <h2 class="section-title" data-i18n="sectionStats">统计</h2>
        <div class="field">
          <label for="statsRange" data-i18n="lblStatsRange">统计天数</label>
          <select id="statsRange">
            <option value="1" data-i18n="statsD1">近 1 日</option>
            <option value="7" selected data-i18n="statsD7">近 7 日</option>
            <option value="30" data-i18n="statsD30">近 30 日</option>
          </select>
        </div>
        <button type="button" class="btn btn--secondary" id="btnStats" style="width:auto;min-width:0;margin-bottom:0.75rem" data-i18n="btnLoadStats">加载统计</button>
        <div id="statsOut"></div>
      </div>

      <div class="save-bar">
        <button type="button" class="btn btn--primary" id="btnSave" data-i18n="btnSaveGroup">保存群设置</button>
        <p class="sub" style="margin:0.5rem 0 0;font-size:0.75rem" data-i18n="hintSaveBar">保存群设置不含题库；问卷模式下可多次「保存题目」添加多道题。</p>
      </div>
    </div>
  </div>
  <script src="/shared/i18n.js"></script>
  <script src="/admin/admin.js"></script>
</body>
</html>
